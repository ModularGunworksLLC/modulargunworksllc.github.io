# Archived static site only: updates JSON under legacy/github-pages-static/data/.
# Live catalog sync runs on WordPress (mgw-chattanooga-sync on Lightsail), not via this workflow.
name: Archived static — Chattanooga JSON sync (manual)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legacy/github-pages-static

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Set API credentials
        run: |
          echo "API_SID=${{ secrets.CHATTANOOGA_SID }}" >> $GITHUB_ENV
          echo "API_TOKEN=${{ secrets.CHATTANOOGA_TOKEN }}" >> $GITHUB_ENV

      - name: Sync products from Chattanooga API
        run: node scripts/sync-products.js

      - name: Check for changes
        id: check_changes
        working-directory: .
        run: |
          if git diff --quiet legacy/github-pages-static/data/products/mapped-products/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push product updates
        if: steps.check_changes.outputs.has_changes == 'true'
        working-directory: .
        run: |
          git config --global user.name "Modular Gunworks Bot"
          git config --global user.email "bot@modulargunworks.com"
          git add legacy/github-pages-static/data/products/mapped-products/
          git commit -m "chore(legacy-static): refresh mapped-products JSON $(date -u +%Y-%m-%dT%H:%MZ)"
          git push origin main

      - name: Log status
        run: |
          echo "Workflow finished (archived static tree only)."
