<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Modular Gunworks</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #1a1a1a; color: #eee; text-align: center; padding: 1rem; }
    a { color: #ff6600; }
    p { margin: 0.5rem 0; }
  </style>
</head>
<body>
  <div>
    <p id="msg">Redirecting to admin…</p>
    <p><a id="link" href="#">Open admin</a> if you are not redirected.</p>
  </div>
  <script>
    // When you deploy the admin (e.g. to Render), set this to your admin app URL.
    var ADMIN_APP_URL = ''; // e.g. 'https://modulargunworks-admin.onrender.com'

    var isLocal = /^localhost$|^127\.0\.0\.1$/i.test(window.location.hostname);
    var target = isLocal ? 'http://localhost:3001' : (ADMIN_APP_URL || '');
    if (target) {
      document.getElementById('link').href = target;
      window.location.href = target;
    } else {
      document.getElementById('msg').textContent = 'Admin is not configured for this site.';
      document.getElementById('link').textContent = 'Run admin locally: http://localhost:3001';
      document.getElementById('link').href = 'http://localhost:3001';
    }
  </script>
</body>
</html>
